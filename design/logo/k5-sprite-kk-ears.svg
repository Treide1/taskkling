<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <rect x="1" y="1" width="126" height="126" rx="28" fill="#0E1116" stroke="#2A3340" stroke-width="2"/>
  <!-- taskling v2: double-stem ears echoing the kk -->
  <g fill="#8B97A7">
    <!-- ears: two tall stems -->
    <rect x="43" y="14" width="12" height="12" rx="3"/>
    <rect x="71" y="14" width="12" height="12" rx="3"/>
    <rect x="43" y="28" width="12" height="12" rx="3"/>
    <rect x="71" y="28" width="12" height="12" rx="3"/>
    <!-- head -->
    <rect x="29" y="42" width="12" height="12" rx="3"/>
    <rect x="43" y="42" width="12" height="12" rx="3"/>
    <rect x="57" y="42" width="12" height="12" rx="3"/>
    <rect x="71" y="42" width="12" height="12" rx="3"/>
    <rect x="85" y="42" width="12" height="12" rx="3"/>
    <!-- eye row + arms -->
    <rect x="15" y="56" width="12" height="12" rx="3"/>
    <rect x="29" y="56" width="12" height="12" rx="3"/>
    <rect x="57" y="56" width="12" height="12" rx="3"/>
    <rect x="85" y="56" width="12" height="12" rx="3"/>
    <rect x="99" y="56" width="12" height="12" rx="3"/>
    <!-- body -->
    <rect x="29" y="70" width="12" height="12" rx="3"/>
    <rect x="43" y="70" width="12" height="12" rx="3"/>
    <rect x="57" y="70" width="12" height="12" rx="3"/>
    <rect x="71" y="70" width="12" height="12" rx="3"/>
    <rect x="85" y="70" width="12" height="12" rx="3"/>
    <!-- legs -->
    <rect x="29" y="84" width="12" height="12" rx="3"/>
    <rect x="57" y="84" width="12" height="12" rx="3"/>
    <rect x="85" y="84" width="12" height="12" rx="3"/>
    <!-- feet -->
    <rect x="15" y="98" width="12" height="12" rx="3"/>
    <rect x="99" y="98" width="12" height="12" rx="3"/>
  </g>
  <!-- eyes under the ears -->
  <rect x="43" y="56" width="12" height="12" rx="3" fill="#3FB950"/>
  <rect x="71" y="56" width="12" height="12" rx="3" fill="#3FB950"/>
</svg>
