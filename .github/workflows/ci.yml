name: CI

on:
  push:
    branches: [ main ]
  pull_request:

defaults:
  run:
    shell: bash

jobs:
  jvm:
    name: JVM (contract + core + ui)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Cache Kotlin/Native
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
      - run: chmod +x ./gradlew
      - name: Build & test JVM
        # :ui is a plain kotlin-jvm module, so its test task is `test` (not `jvmTest`); it
        # compiles main + test and runs the Layout/viewport math unit tests, subsuming the
        # previous compile-only check.
        run: ./gradlew :contract:jvmTest :core:jvmTest :ui:test --no-daemon --stacktrace
      - name: Common (metadata) compilation
        # Rot guard (t-x5ur). The task list above only ever compiles the *JVM leaf* of each
        # KMP module, so the common/intermediate source sets were never forced green by CI —
        # and they silently broke: `./gradlew build` failed on clean main with ~70 unresolved
        # okio references in :core:compileCommonMainKotlinMetadata (plus a commonizer opt-in
        # error in posixMain), which nothing caught because the metadata tasks are not in
        # CI's graph. allMetadataJar is the narrow umbrella over exactly those compilations
        # (commonMain + every shared source set) and nothing else — no native links, no tests.
        # ~10 s added to this job, which is not CI's critical path (the MingwX64 leg is).
        run: ./gradlew :contract:allMetadataJar :core:allMetadataJar :cli:allMetadataJar --no-daemon --stacktrace
      - name: UI packaging checks
        # ADR-016 decision 7: build all four per-target uberjars and run the cheap audits —
        # (b) jdeps module deps ⊆ curated jlink list, (c) each jar carries its own Skiko
        # native and no foreign-OS ones. Guards exactly what PRs change (dependency bumps,
        # packaging edits); jlink itself stays release-only (pinned inputs, ~300 MB to re-verify).
        run: ./gradlew :ui:checkUiPackaging --no-daemon --stacktrace

  native:
    name: Native (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: LinuxX64
            test: linuxX64Test
          - os: macos-latest
            target: MacosArm64
            test: macosArm64Test
          - os: macos-latest
            target: MacosX64
            test: macosX64Test
          - os: windows-latest
            target: MingwX64
            test: mingwX64Test
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Cache Kotlin/Native
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
      - run: chmod +x ./gradlew
      - if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev
      - name: Build & test ${{ matrix.target }} CLI
        # The :cli <target>Test task depends on linkDebugExecutable<Target> (wired in
        # cli/build.gradle.kts), so this links the product binary AND runs the black-box
        # subprocess golden tests (t-hfwt) + the pure-helper unit seam (t-oxaa) against that
        # freshly-linked binary — CI is the cross-platform verifier for the single read+write path.
        run: ./gradlew :cli:${{ matrix.test }} --no-daemon --stacktrace

  install-scripts:
    name: Install script regression tests (${{ matrix.name }})
    # Shell-level regression tests for install.ps1 / install.sh (t-dywy) — no Kotlin/Gradle
    # involved, so this is its own fast, no-checkout-heavy job additive to jvm/native above.
    # Each harness is fully offline (a local file:// fake release) and touches only scratch
    # registry keys / scratch $HOME dirs, never the runner's real environment.
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: install.ps1 (PATH registry logic)
          - os: ubuntu-latest
            name: install.sh (PATH hint selection)
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      # `shell:` takes no expression context, so the two harnesses are separate
      # OS-gated steps with literal shells instead of one matrix-templated step.
      - name: Run install.ps1 harness
        if: runner.os == 'Windows'
        shell: powershell
        run: .\scripts\tests\install-ps1-path.tests.ps1
      - name: Run install.sh harness
        if: runner.os == 'Linux'
        run: bash scripts/tests/install-sh-path.tests.sh
