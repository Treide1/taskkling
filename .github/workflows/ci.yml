name: CI

on:
  push:
    branches: [ main ]
  pull_request:

defaults:
  run:
    shell: bash

jobs:
  jvm:
    name: JVM (contract + core + ui)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Cache Kotlin/Native
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
      - run: chmod +x ./gradlew
      - name: Build & test JVM
        # :ui is a plain kotlin-jvm module, so its test task is `test` (not `jvmTest`); it
        # compiles main + test and runs the Layout/viewport math unit tests, subsuming the
        # previous compile-only check.
        run: ./gradlew :contract:jvmTest :core:jvmTest :ui:test --no-daemon --stacktrace

  native:
    name: Native (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: LinuxX64
          - os: macos-latest
            target: MacosArm64
          - os: macos-latest
            target: MacosX64
          - os: windows-latest
            target: MingwX64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Cache Kotlin/Native
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
      - run: chmod +x ./gradlew
      - if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev
      - name: Link ${{ matrix.target }} executable
        run: ./gradlew :cli:linkDebugExecutable${{ matrix.target }} --no-daemon --stacktrace
