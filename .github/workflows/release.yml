name: Release

# Wire-only automation (PRD §15): pushing a version tag (e.g. `v0.1.0`) builds the
# four per-platform Kotlin/Native release binaries, checksums them, and publishes
# them — together with the install scripts — to the matching GitHub Release. No tag
# is cut by this repo's automation; a human tags when ready.
on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  # 0) Gate: run the JVM test suites before spending native-build minutes. `build`
  #    (and transitively `publish`) needs this, so a red suite skips the whole native
  #    matrix AND blocks the release — a pushed tag can never publish an untested
  #    commit, regardless of how it was cut. Mirrors ci.yml's JVM job (:ui is plain
  #    kotlin-jvm, so its task is `:ui:test`, not KMP's jvmTest).
  test:
    name: Test (JVM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - run: chmod +x ./gradlew
      - name: JVM + UI test suites
        run: ./gradlew :contract:jvmTest :core:jvmTest :ui:test --no-daemon --stacktrace

  # 1) Fan out: link each target's release binary and upload it as a workflow
  #    artifact. macOS rows additionally inspect the linker's ad-hoc signature.
  build:
    name: ${{ matrix.artifact }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: LinuxX64
            artifact: taskkling-linux-x64
          - os: macos-latest
            target: MacosArm64
            artifact: taskkling-macos-arm64
          - os: macos-latest
            target: MacosX64
            artifact: taskkling-macos-x64
          - os: windows-latest
            target: MingwX64
            artifact: taskkling-windows-x64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Cache Kotlin/Native
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
      - run: chmod +x ./gradlew
      - name: Link release ${{ matrix.target }}
        run: ./gradlew :cli:linkReleaseExecutable${{ matrix.target }} --no-daemon --stacktrace
      - name: Stage artifact
        run: |
          src=$(ls cli/build/bin/*/releaseExecutable/taskkling.* | head -1)
          echo "staging $src -> ${{ matrix.artifact }}"
          cp "$src" "${{ matrix.artifact }}"
      - name: Verify macOS ad-hoc signature
        if: runner.os == 'macOS'
        # NOT a signing step. The Kotlin/Native linker applies an ad-hoc signature
        # on macOS; this only inspects it as a guard. `codesign -dv` writes to
        # stderr; tolerate output-format drift so the build never fails on it.
        run: codesign -dv "${{ matrix.artifact }}" || true
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

  # 1b) UI assets (ADR-016): ONE ubuntu leg, parallel to the native matrix, builds
  #     all 8 UI assets — four per-target uberjars (Gradle tasks from ADR-016/t-tw0q)
  #     and four jlink runtime images cross-linked from PINNED Temurin jmods. The pin
  #     (exact build + per-target SHA256s below) makes releases byte-reproducible per
  #     tag and turns a shifted upstream archive into a loud failure; bumping it is a
  #     deliberate one-commit act (see RELEASING.md).
  build-ui:
    name: UI assets (uberjars + runtimes)
    needs: test
    runs-on: ubuntu-latest
    env:
      # Temurin pin (ADR-016 decision 3). Quarterly CPU updates land here by hand;
      # a JDK MAJOR bump also touches the curated module list (ui/build.gradle.kts),
      # asset names (ADR-011: jdk<major>) and cache keys (ADR-010) in one change.
      TEMURIN_TAG: jdk-21.0.8+9
      TEMURIN_VERSION: 21.0.8_9
      SHA256_LINUX_X64: f2dc5418092c43003db8f9005c4a286e1c0104fea96ccdd49e8ebd037cac9219
      SHA256_MACOS_X64: 0ceaf7060b2c9dbbe8ecc4fb9351c6b4cf24e4350d58772c9656589933a4fdeb
      SHA256_MACOS_ARM64: 59422c2292ae4e76b87e00d8808dbe49cffa39af731e08bb0292ddb0af4e0261
      SHA256_WINDOWS_X64: 5dbb74a4edda94c2aae97a1e30f448db0ad9023a9466fe31a8c68377d9dfbac4
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - run: chmod +x ./gradlew
      - name: Build the four per-target uberjars + packaging audits
        # checkUiPackaging re-runs the jdeps-subset tripwire and the Skiko-native audit
        # (ADR-016 decision 5 b+c) against the exact jars this release will ship.
        run: ./gradlew :ui:packageAllUberJars :ui:checkUiPackaging --no-daemon --stacktrace
      - name: Download + verify pinned Temurin jmods
        run: |
          set -euo pipefail
          base="https://github.com/adoptium/temurin21-binaries/releases/download/${TEMURIN_TAG/+/%2B}"
          declare -A archives=(
            [linux-x64]="OpenJDK21U-jdk_x64_linux_hotspot_${TEMURIN_VERSION}.tar.gz"
            [macos-x64]="OpenJDK21U-jdk_x64_mac_hotspot_${TEMURIN_VERSION}.tar.gz"
            [macos-arm64]="OpenJDK21U-jdk_aarch64_mac_hotspot_${TEMURIN_VERSION}.tar.gz"
            [windows-x64]="OpenJDK21U-jdk_x64_windows_hotspot_${TEMURIN_VERSION}.zip"
          )
          declare -A sha256s=(
            [linux-x64]="$SHA256_LINUX_X64"
            [macos-x64]="$SHA256_MACOS_X64"
            [macos-arm64]="$SHA256_MACOS_ARM64"
            [windows-x64]="$SHA256_WINDOWS_X64"
          )
          for target in linux-x64 macos-x64 macos-arm64 windows-x64; do
            archive="${archives[$target]}"
            echo "fetching $archive"
            curl -fsSL -o "$archive" "$base/$archive"
            echo "${sha256s[$target]}  $archive" | sha256sum -c -
            mkdir "jdk-$target"
            case "$archive" in
              *.zip) unzip -q "$archive" -d "jdk-$target" ;;
              *) tar -xzf "$archive" -C "jdk-$target" ;;
            esac
            rm "$archive"
          done
      - name: Cross-jlink the four runtime images
        # jlink links against the TARGET's jmods, so one linux leg produces all four
        # images (ADR-009's single-runner rule). The module set is the curated list
        # single-sourced in ui/build.gradle.kts (ADR-016 decision 4).
        run: |
          set -euo pipefail
          modules="$(./gradlew -q :ui:printUiRuntimeModules --no-daemon | tail -1)"
          echo "curated module list: $modules"
          for target in linux-x64 macos-x64 macos-arm64 windows-x64; do
            jmods="$(find "jdk-$target" -type d -name jmods | head -1)"
            test -n "$jmods" || { echo "::error::no jmods dir found for $target"; exit 1; }
            jlink --module-path "$jmods" --add-modules "$modules" \
              --strip-debug --no-header-files --no-man-pages --compress zip-6 \
              --output "runtime-$target"
          done
      - name: Smoke-check the runtime images
        # ADR-016 decision 5 (a): the host-runnable linux image must actually execute;
        # the three cross-linked images get a structural launcher-presence check.
        run: |
          set -euo pipefail
          ./runtime-linux-x64/bin/java -version
          test -x runtime-macos-x64/bin/java
          test -x runtime-macos-arm64/bin/java
          test -f runtime-windows-x64/bin/java.exe
      - name: Package the 8 UI assets
        # Runtime archives carry the image CONTENTS at top level (bin/, lib/ — the
        # verb's extraction contract, t-k7ee); tar.gz built on linux so the executable
        # bit survives for the unix targets, zip for windows (ADR-011 decision 1).
        run: |
          set -euo pipefail
          mkdir ui-out
          for target in linux-x64 macos-x64 macos-arm64; do
            tar -czf "ui-out/taskkling-ui-runtime-jdk21-$target.tar.gz" -C "runtime-$target" .
          done
          (cd runtime-windows-x64 && zip -qr "../ui-out/taskkling-ui-runtime-jdk21-windows-x64.zip" .)
          cp ui/build/uberjars/taskkling-ui-*.jar ui-out/
          ls -l ui-out
      - name: Upload UI assets
        uses: actions/upload-artifact@v4
        with:
          name: taskkling-ui-assets
          path: ui-out/*
          if-no-files-found: error

  # 2) Fan in: gather the 12 payload assets (4 CLI binaries + 8 UI assets), assert
  #    the count, checksum them into ONE SHA256SUMS, and publish the Release with
  #    the payload + SHA256SUMS + both install scripts. A tag/version guard asserts
  #    the pushed `vX.Y.Z` matches the declared gradle.properties version.
  release:
    name: Publish release
    needs: [build, build-ui]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify tag matches gradle version
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          gradle_version="$(grep -E '^version=' gradle.properties | cut -d '=' -f2 | tr -d '[:space:]')"
          echo "pushed tag:                v$tag"
          echo "gradle.properties version: $gradle_version"
          if [ "$tag" != "$gradle_version" ]; then
            echo "::error::Tag v$tag does not match gradle.properties version $gradle_version"
            exit 1
          fi
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Assert the full asset set is present
        # ADR-016 decision 6: ONE numeric invariant instead of two hand-maintained
        # 13-entry lists. 12 payload files = 4 CLI binaries + 4 UI uberjars + 4 UI
        # runtime archives; a half-succeeded upload fails HERE, not in users' hands.
        # This count moves in lockstep with any future asset-set change (ADR-011).
        working-directory: dist
        run: |
          count=$(ls taskkling-* | wc -l)
          echo "payload files in dist/: $count"
          ls -l taskkling-*
          if [ "$count" -ne 12 ]; then
            echo "::error::expected exactly 12 payload assets in dist/, found $count"
            exit 1
          fi
      - name: Generate SHA256SUMS
        # The glob covers every payload asset, so the single SHA256SUMS spans the
        # full set (ADR-011: no separate UI sums file) — guaranteed by the count
        # assertion above.
        working-directory: dist
        run: |
          sha256sum taskkling-* > SHA256SUMS
          cat SHA256SUMS
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/taskkling-*
            dist/SHA256SUMS
            install.sh
            install.ps1
